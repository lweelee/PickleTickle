<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 Pickleball Tournament</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0e0f0e;
  --surface: #161817;
  --surface2: #1e201e;
  --border: rgba(255,255,255,0.09);
  --border2: rgba(255,255,255,0.18);
  --accent: #b5f23a;
  --accent-dim: rgba(181,242,58,0.12);
  --text: #f0f2ee;
  --text2: #8a9088;
  --text3: #4e524d;
  --win-bg: rgba(181,242,58,0.13);
  --win: #b5f23a;
  --loss-bg: rgba(255,80,80,0.12);
  --loss: #ff7070;
  --r: 10px;
  --rlg: 14px;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
  font-size: 15px;
  line-height: 1.4;
}

/* HEADER */
.hdr {
  position: sticky; top: 0; z-index: 99;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo { width: 34px; height: 34px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.hdr h1 { font-size: 15px; font-weight: 700; color: var(--text); }
.hdr p  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.hdr-time { font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(181,242,58,0.25); padding: 5px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

/* MAIN */
.main { padding: 14px 14px 0; max-width: 600px; margin: 0 auto; }

/* STATS STRIP */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 16px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 6px; text-align: center; }
.stat-v { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-l { font-size: 10px; color: var(--text2); margin-top: 1px; }

/* BOTTOM NAV */
.bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; padding-bottom: env(safe-area-inset-bottom, 0);
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 4px 10px; border: none; background: transparent;
  font-size: 10px; font-weight: 600; color: var(--text3); cursor: pointer;
  font-family: inherit;
}
.bnav-btn .ico { font-size: 22px; line-height: 1; }
.bnav-btn.on { color: var(--accent); }

/* VIEWS */
.view { display: none; }
.view.on { display: block; }

/* ── SCORE ENTRY ── */
.team-scroll {
  display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px;
  margin-bottom: 14px; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.team-scroll::-webkit-scrollbar { display: none; }
.tbtn {
  flex-shrink: 0; padding: 8px 14px; border-radius: var(--r);
  border: 1.5px solid var(--border); background: var(--surface);
  font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text2);
  font-family: inherit; white-space: nowrap;
}
.tbtn.on { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rlg); overflow: hidden; }
.card-hdr { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.ava { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.card-hdr h2 { font-size: 15px; font-weight: 700; }
.card-hdr p  { font-size: 11px; color: var(--text2); margin-top: 1px; }

/* Each game row */
.grow {
  display: grid;
  grid-template-columns: 38px 1fr 36px 58px;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
}
.grow:last-child { border-bottom: none; }
.rbadge { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 11px; padding: 3px 6px; border-radius: 5px; text-align: center; display: block; }
.opp-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.opp-mem  { font-size: 10px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rbadge-res { font-size: 11px; font-weight: 700; padding: 3px 6px; border-radius: 5px; background: var(--surface2); color: var(--text3); text-align: center; display: block; }
.rbadge-res.win  { background: var(--win-bg); color: var(--win); }
.rbadge-res.loss { background: var(--loss-bg); color: var(--loss); }

.pts-inp {
  width: 100%; height: 42px; font-size: 18px; font-weight: 700;
  text-align: center; background: var(--surface2);
  border: 1.5px solid var(--border); border-radius: var(--r);
  color: var(--text); outline: none; font-family: inherit;
  -moz-appearance: textfield;
}
.pts-inp::-webkit-outer-spin-button,
.pts-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.pts-inp:focus { border-color: rgba(181,242,58,0.5); background: #111; }

.card-foot { padding: 12px 14px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: space-between; }
.foot-lbl { font-size: 13px; color: var(--text2); }
.total-pts { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.total-sub { font-size: 10px; color: var(--text3); margin-top: 2px; text-align: right; }

/* ── LEADERBOARD ── */
.podium-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.pod { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rlg); padding: 12px 8px; text-align: center; }
.pod.p1 { border-color: rgba(181,242,58,0.3); }
.pod-medal { font-size: 22px; }
.pod-name { font-size: 12px; font-weight: 700; margin-top: 4px; }
.pod-mem  { font-size: 9px; color: var(--text2); margin-top: 2px; }
.pod-pts  { font-size: 22px; font-weight: 700; margin-top: 6px; color: var(--text); }
.pod.p1 .pod-pts { color: var(--accent); }
.pod-lbl  { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }

.lb-rows { display: flex; flex-direction: column; gap: 6px; }
.lb-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 11px 14px; }
.lb-row.p1 { border-color: rgba(181,242,58,0.25); }
.lb-num { font-size: 14px; font-weight: 700; color: var(--text3); width: 20px; flex-shrink: 0; }
.lb-row.p1 .lb-num { color: var(--accent); }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-size: 13px; font-weight: 700; }
.lb-mem  { font-size: 10px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-stats { display: flex; gap: 12px; flex-shrink: 0; }
.lbs { text-align: right; }
.lbs-v { font-size: 15px; font-weight: 700; }
.lbs-v.pts { color: var(--accent); font-size: 17px; }
.lbs-l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }

/* ── SCHEDULE ── */
.sch-list { display: flex; flex-direction: column; gap: 10px; }
.sch-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rlg); overflow: hidden; }
.sch-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
.sch-rnd  { font-size: 13px; font-weight: 700; }
.sch-time { font-size: 11px; color: var(--accent); }
.sch-courts { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
.ct { padding: 10px 12px; }
.ct:first-child { border-right: 1px solid var(--border); }
.ct-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
.ct:first-child .ct-lbl { color: #5ca3e8; }
.ct:last-child  .ct-lbl { color: #9dc43a; }
.ct-team { margin-bottom: 2px; }
.ct-team-name { font-size: 12px; font-weight: 600; }
.ct-team-mem  { font-size: 10px; color: var(--text3); margin-top: 1px; }
.ct-vs { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin: 5px 0; }
.ct-empty { font-size: 11px; color: var(--text3); padding-top: 4px; }
.sch-rest { padding: 9px 12px; }
.rest-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 7px; }
.rest-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.rchip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; }
.rchip-name { font-size: 11px; font-weight: 600; color: var(--text2); }
.rchip-mem  { font-size: 9px; color: var(--text3); margin-top: 1px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">🏓</div>
    <div>
      <h1>Pickleball Tournament</h1>
      <p>7 teams · 2 courts · 11 rounds</p>
    </div>
  </div>
  <div class="hdr-time">6–8 PM</div>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-v">11</div><div class="stat-l">Rounds</div></div>
    <div class="stat"><div class="stat-v">21</div><div class="stat-l">Games</div></div>
    <div class="stat"><div class="stat-v">6</div><div class="stat-l">Per team</div></div>
    <div class="stat"><div class="stat-v">3</div><div class="stat-l">Rest/rnd</div></div>
  </div>

  <div class="view on" id="view-scores">
    <div class="team-scroll" id="team-sel"></div>
    <div id="card-wrap"></div>
  </div>

  <div class="view" id="view-lb">
    <div class="podium-row" id="lb-pod"></div>
    <div class="lb-rows" id="lb-rows"></div>
  </div>

  <div class="view" id="view-sch">
    <div class="sch-list" id="sch-rows"></div>
  </div>
</div>

<nav class="bnav">
  <button class="bnav-btn on" id="bn-scores" onclick="go('scores')">
    <span class="ico">✏️</span><span>Scores</span>
  </button>
  <button class="bnav-btn" id="bn-lb" onclick="go('lb')">
    <span class="ico">🏆</span><span>Standings</span>
  </button>
  <button class="bnav-btn" id="bn-sch" onclick="go('sch')">
    <span class="ico">📋</span><span>Schedule</span>
  </button>
</nav>

<script>
var T = {
  A:{name:"Team A",mem:"AJ & Cheng",       av:"AC",bg:"rgba(56,138,221,.15)", tc:"#5ca3e8"},
  B:{name:"Team B",mem:"Dex & YX",          av:"DY",bg:"rgba(181,242,58,.15)",tc:"#9dc43a"},
  C:{name:"Team C",mem:"Uncle Ken & Wee Lee",av:"KW",bg:"rgba(200,130,255,.15)",tc:"#b87fff"},
  D:{name:"Team D",mem:"Vuili & May",        av:"VM",bg:"rgba(255,160,60,.15)", tc:"#ffaa3c"},
  E:{name:"Team E",mem:"Ervy & Wafiee",      av:"EW",bg:"rgba(255,80,120,.15)", tc:"#ff6090"},
  F:{name:"Team F",mem:"Jason & Muq",        av:"JM",bg:"rgba(60,210,200,.15)", tc:"#3cd2c8"},
  G:{name:"Team G",mem:"Vuina & Tracy",      av:"VT",bg:"rgba(255,200,60,.15)", tc:"#ffc83c"}
};

var R = [
  {c1:["D","E"],c2:["F","G"],rest:["A","B","C"]},
  {c1:["A","B"],c2:["C","D"],rest:["E","F","G"]},
  {c1:["E","G"],c2:["B","F"],rest:["A","C","D"]},
  {c1:["A","C"],c2:["D","G"],rest:["B","E","F"]},
  {c1:["B","E"],c2:["C","F"],rest:["A","D","G"]},
  {c1:["A","D"],c2:["B","G"],rest:["C","E","F"]},
  {c1:["C","E"],c2:["A","F"],rest:["B","D","G"]},
  {c1:["B","D"],c2:["C","G"],rest:["A","E","F"]},
  {c1:["E","F"],c2:["A","G"],rest:["B","C","D"]},
  {c1:["B","C"],c2:["D","F"],rest:["A","E","G"]},
  {c1:["A","E"],c2:null,     rest:["B","C","D","F","G"]}
];

var SC = {}; // scores
Object.keys(T).forEach(function(t){SC[t]={};});
var active = "A";

function games(tid) {
  var g = [];
  R.forEach(function(r,i){
    if(r.c1&&r.c1.indexOf(tid)>=0) g.push({rnd:i+1,opp:r.c1[0]===tid?r.c1[1]:r.c1[0],ct:1});
    else if(r.c2&&r.c2.indexOf(tid)>=0) g.push({rnd:i+1,opp:r.c2[0]===tid?r.c2[1]:r.c2[0],ct:2});
  });
  return g;
}

function result(tid,rnd,opp) {
  var m=SC[tid][rnd], o=SC[opp][rnd];
  if(m===undefined||m===""||o===undefined||o==="") return "";
  return m>o?"W":m<o?"L":"D";
}

function stats(tid) {
  var g=games(tid), pts=0, wins=0, played=0;
  g.forEach(function(x){
    var s=SC[tid][x.rnd];
    if(s!==undefined&&s!==""){pts+=parseInt(s);played++;}
    if(result(tid,x.rnd,x.opp)==="W") wins++;
  });
  return {pts:pts,wins:wins,played:played};
}

function setScore(tid,rnd,val) {
  var n=parseInt(val);
  SC[tid][rnd]=(isNaN(n)||val==="")?"":Math.min(15,Math.max(0,n));
  var st=stats(tid);
  var tp=document.querySelector(".total-pts");
  var ts=document.querySelector(".total-sub");
  if(tp) tp.textContent=st.pts;
  if(ts) ts.textContent=st.wins+" win"+(st.wins!==1?"s":"")+" \u00b7 "+st.played+"/6 entered";
  var g=games(tid), gx=null;
  for(var i=0;i<g.length;i++){if(g[i].rnd===rnd){gx=g[i];break;}}
  var rel=document.getElementById("res-"+tid+"-"+rnd);
  if(rel&&gx){
    var res=result(tid,rnd,gx.opp);
    rel.textContent=res||"–";
    rel.className="rbadge-res"+(res==="W"?" win":res==="L"?" loss":"");
  }
}

function go(v) {
  ["scores","lb","sch"].forEach(function(id){
    document.getElementById("view-"+id).className="view"+(id===v?" on":"");
    document.getElementById("bn-"+id).className="bnav-btn"+(id===v?" on":"");
  });
  if(v==="lb") renderLB();
}

function buildSel() {
  var html="";
  Object.keys(T).forEach(function(tid){
    html+='<button class="tbtn'+(tid===active?" on":"") +'" onclick="pick(\''+tid+'\')">'+T[tid].name+'</button>';
  });
  document.getElementById("team-sel").innerHTML=html;
}

function pick(tid) {
  active=tid;
  buildSel();
  renderCard();
}

function renderCard() {
  var tid=active, t=T[tid], g=games(tid), st=stats(tid);
  var rows="";
  g.forEach(function(x){
    var res=result(tid,x.rnd,x.opp);
    var s=SC[tid][x.rnd];
    var val=(s!==undefined&&s!=="")? s:"";
    rows+='<div class="grow">'
      +'<span class="rbadge">R'+x.rnd+'</span>'
      +'<div><div class="opp-name">vs '+T[x.opp].name+'</div><div class="opp-mem">'+T[x.opp].mem+'</div></div>'
      +'<span class="rbadge-res'+(res==="W"?" win":res==="L"?" loss":"") +'" id="res-'+tid+'-'+x.rnd+'">'+(res||"–")+'</span>'
      +'<input class="pts-inp" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="15" placeholder="–" value="'+val+'"'
      +' oninput="setScore(\''+tid+'\','+x.rnd+',this.value)"'
      +' onblur="if(this.value>15)this.value=15;if(this.value<0&&this.value!=\'\')this.value=0;setScore(\''+tid+'\','+x.rnd+',this.value)"'
      +' onkeydown="if(event.key===\'Enter\')this.blur()"'
      +'/>'
      +'</div>';
  });
  document.getElementById("card-wrap").innerHTML=
    '<div class="card">'
    +'<div class="card-hdr"><div class="ava" style="background:'+t.bg+';color:'+t.tc+'">'+t.av+'</div>'
    +'<div><h2>'+t.name+'</h2><p>'+t.mem+'</p></div></div>'
    +'<div>'+rows+'</div>'
    +'<div class="card-foot"><div class="foot-lbl">🏆 Total points</div>'
    +'<div><div class="total-pts">'+st.pts+'</div><div class="total-sub">'+st.wins+' win'+(st.wins!==1?'s':'')+' \u00b7 '+st.played+'/6 entered</div></div>'
    +'</div></div>';
}

function renderLB() {
  var rows=Object.keys(T).map(function(tid){
    var st=stats(tid); return {tid:tid,pts:st.pts,wins:st.wins,played:st.played};
  }).sort(function(a,b){return b.pts-a.pts||b.wins-a.wins;});

  var medals=["🥇","🥈","🥉"];
  var ph="";
  rows.slice(0,3).forEach(function(r,i){
    var t=T[r.tid];
    ph+='<div class="pod'+(i===0?" p1":"")+'">'
      +'<div class="pod-medal">'+medals[i]+'</div>'
      +'<div class="pod-name">'+t.name+'</div>'
      +'<div class="pod-mem">'+t.mem+'</div>'
      +'<div class="pod-pts">'+r.pts+'</div>'
      +'<div class="pod-lbl">pts</div>'
      +'</div>';
  });
  document.getElementById("lb-pod").innerHTML=ph;

  var lh="";
  rows.forEach(function(r,i){
    var t=T[r.tid];
    lh+='<div class="lb-row'+(i===0?" p1":"")+'">'
      +'<div class="lb-num">'+(i+1)+'</div>'
      +'<div class="lb-info"><div class="lb-name">'+t.name+'</div><div class="lb-mem">'+t.mem+'</div></div>'
      +'<div class="lb-stats">'
      +'<div class="lbs"><div class="lbs-v pts">'+r.pts+'</div><div class="lbs-l">Pts</div></div>'
      +'<div class="lbs"><div class="lbs-v">'+r.wins+'</div><div class="lbs-l">Wins</div></div>'
      +'<div class="lbs"><div class="lbs-v">'+r.played+'/6</div><div class="lbs-l">Played</div></div>'
      +'</div></div>';
  });
  document.getElementById("lb-rows").innerHTML=lh;
}

function buildSch() {
  var sm=18*60;
  var fmt=function(m){return ("0"+Math.floor(m/60)).slice(-2)+":"+("0"+(m%60)).slice(-2);};
  var html="";
  R.forEach(function(r,i){
    var t=sm+i*10;
    var c2h=r.c2
      ?'<div class="ct-team"><div class="ct-team-name">'+T[r.c2[0]].name+'</div><div class="ct-team-mem">'+T[r.c2[0]].mem+'</div></div>'
       +'<div class="ct-vs">vs</div>'
       +'<div class="ct-team"><div class="ct-team-name">'+T[r.c2[1]].name+'</div><div class="ct-team-mem">'+T[r.c2[1]].mem+'</div></div>'
      :'<div class="ct-empty">Not in use</div>';
    var chips=r.rest.map(function(tid){
      return '<div class="rchip"><div class="rchip-name">'+T[tid].name+'</div><div class="rchip-mem">'+T[tid].mem+'</div></div>';
    }).join("");
    html+='<div class="sch-card">'
      +'<div class="sch-hdr"><span class="sch-rnd">Round '+(i+1)+'</span><span class="sch-time">'+fmt(t)+' – '+fmt(t+10)+'</span></div>'
      +'<div class="sch-courts">'
      +'<div class="ct"><div class="ct-lbl">Court 1</div>'
      +'<div class="ct-team"><div class="ct-team-name">'+T[r.c1[0]].name+'</div><div class="ct-team-mem">'+T[r.c1[0]].mem+'</div></div>'
      +'<div class="ct-vs">vs</div>'
      +'<div class="ct-team"><div class="ct-team-name">'+T[r.c1[1]].name+'</div><div class="ct-team-mem">'+T[r.c1[1]].mem+'</div></div>'
      +'</div>'
      +'<div class="ct"'+(r.c2?'':' style="opacity:.4"')+'><div class="ct-lbl">Court 2</div>'+c2h+'</div>'
      +'</div>'
      +'<div class="sch-rest"><div class="rest-lbl">Resting</div><div class="rest-chips">'+chips+'</div></div>'
      +'</div>';
  });
  document.getElementById("sch-rows").innerHTML=html;
}

buildSel();
renderCard();
buildSch();
</script>
</body>
</html>
